---
# Single secret serves both the MariaDB User CRD (passwordSecretKeyRef) and the
# app (envFrom). Create a Bitwarden item and replace the placeholder UUID.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: birdnet-go-secret
  namespace: tools
spec:
  refreshInterval: 1h
  target:
    name: birdnet-go-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        MYSQL_PASSWORD: "{{ .db_password }}"
        RTSP_URL: "{{ .rtsp_url }}"
  data:
    - secretKey: db_password
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: 46a0bee4-d890-426c-98c9-11cfae50d5bf
        property: db_password
    - secretKey: rtsp_url
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: 46a0bee4-d890-426c-98c9-11cfae50d5bf
        property: rtsp_url
