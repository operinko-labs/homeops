---
# birdnet-go has NO env-var override for output.mysql.* or rtsp URLs (only
# birdnet.*/security.*), so secrets must live inside config.yaml. We render the
# whole file here via ESO templating and seed it onto the writable PVC, keeping
# the raw password/URL out of git. The MYSQL_PASSWORD key also feeds the
# MariaDB User CRD (passwordSecretKeyRef).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: birdnet-go-secret
  namespace: tools
spec:
  refreshInterval: 1h
  target:
    name: birdnet-go-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        MYSQL_PASSWORD: "{{ .db_password }}"
        config.yaml: |
          birdnet:
            locale: en
            latitude: 60.5456 # Kuokkapellontie, Rusko (species range filter)
            longitude: 22.2549
            sensitivity: 1.0
            threshold: 0.8
            overlap: 0.0
            usexnnpack: true
          realtime:
            rtsp:
              streams:
                - name: Front Yard
                  url: "{{ .rtsp_url }}"
                  transport: tcp
            audio:
              sources: []
              export:
                enabled: true
                path: /data/clips
                type: wav
          output:
            mysql:
              enabled: true
              host: mariadb.database.svc.cluster.local
              port: "3306"
              database: birdnet
              username: birdnet
              password: "{{ .db_password }}"
          webserver:
            port: 8080
  data:
    - secretKey: db_password
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: 46a0bee4-d890-426c-98c9-11cfae50d5bf
        property: db_password
    - secretKey: rtsp_url
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: 46a0bee4-d890-426c-98c9-11cfae50d5bf
        property: rtsp_url
