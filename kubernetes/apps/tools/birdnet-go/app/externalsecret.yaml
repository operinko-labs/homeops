---
# Provides the MariaDB password for the User CRD (passwordSecretKeyRef). The
# app now owns its config.yaml on the PVC (the init seed was removed once it was
# running), so the RTSP URL + MySQL settings live there and are managed via the
# BirdNET-Go UI — rotating the password means updating it once in the UI too.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: birdnet-go-secret
  namespace: tools
spec:
  refreshInterval: 1h
  target:
    name: birdnet-go-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        MYSQL_PASSWORD: "{{ .db_password }}"
  data:
    - secretKey: db_password
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: 46a0bee4-d890-426c-98c9-11cfae50d5bf
        property: db_password
