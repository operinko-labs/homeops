# Initial seed only — birdnet-go owns this file at runtime on the PVC.
# ${MYSQL_PASSWORD} and ${RTSP_URL} are expanded from env (the ExternalSecret).
# NOTE: verify key names against your birdnet-go version's reference config.
birdnet:
  locale: en
  latitude: 60.5456 # Kuokkapellontie, Rusko (species range filter)
  longitude: 22.2549
  sensitivity: 1.0
  threshold: 0.8
  overlap: 0.0
  modelpath: "" # embedded BirdNET v2.4; install Perch v2 via the model gallery
  labelpath: ""
  usexnnpack: true

realtime:
  rtsp:
    streams:
      - name: Front Yard
        url: ${RTSP_URL} # Unifi Protect RTSPS token URL, e.g. rtsps://<host>:7441/<token>?enableSrtp
        transport: tcp
    health:
      healthydatathreshold: 60
      monitoringinterval: 30
  audio:
    # No sound card — audio comes entirely from the RTSP stream above.
    sources: []
    export:
      enabled: true
      path: /config/clips
      type: wav

output:
  mysql:
    enabled: true
    host: mariadb.database.svc.cluster.local
    port: "3306"
    database: birdnet
    username: birdnet
    password: ${MYSQL_PASSWORD}

webserver:
  port: 8080
