---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: birdnet-go
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: birdnet-go
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      birdnet-go:
        containers:
          app:
            image:
              repository: ghcr.io/tphakala/birdnet-go
              tag: nightly@sha256:b02ab3a3037ebe06541ad703f1146eb157f5ec6c1ae1185bd24fccab8fe4ee03
            env:
              TZ: Europe/Helsinki
              # Per upstream docker docs the image starts as root and gosu-drops
              # to this UID/GID, then sets HOME and chowns /config + /data.
              BIRDNET_UID: "1000"
              BIRDNET_GID: "1000"
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            securityContext:
              # Must start as root so the entrypoint can chown the volumes and
              # gosu-drop to BIRDNET_UID/GID — do not force non-root here.
              allowPrivilegeEscalation: true
              readOnlyRootFilesystem: false
            resources:
              requests:
                cpu: 500m # continuous inference; Perch is heavier than v2.4
                memory: 1Gi
              limits:
                memory: 3Gi
    defaultPodOptions:
      securityContext:
        # Entrypoint starts as root then drops to 1000; keep fsGroup so the
        # dropped user can read/write the VolSync PVC.
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}
    service:
      app:
        controller: birdnet-go
        ports:
          http:
            port: 8080
    persistence:
      data:
        existingClaim: birdnet-go
        globalMounts:
          - path: /config # config.yaml (entrypoint symlinks ~/.config/birdnet-go here)
            subPath: config
          - path: /data # WORKDIR: clips + downloaded models (Perch)
            subPath: data
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
