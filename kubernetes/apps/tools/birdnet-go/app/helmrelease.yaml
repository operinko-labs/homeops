---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: birdnet-go
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: birdnet-go
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      birdnet-go:
        initContainers:
          # Seed config.yaml onto the writable PVC on first run only, so the
          # model gallery (Perch) and any UI changes persist and get backed up.
          init-config:
            image:
              repository: docker.io/library/busybox # mirrored via Harbor
              tag: "1.37"
            command:
              - sh
              - -c
              - "[ -f /config/config.yaml ] || cp /seed/config.yaml /config/config.yaml"
        containers:
          app:
            image:
              repository: ghcr.io/tphakala/birdnet-go
              tag: nightly@sha256:60573d17f59c132ac42d9d264508e80cdfbf08125f235aaaf6791a9ce511af68
            env:
              TZ: Europe/Helsinki
              # Per upstream docker docs the image starts as root and gosu-drops
              # to this UID/GID, then sets HOME and chowns /config + /data.
              BIRDNET_UID: "1000"
              BIRDNET_GID: "1000"
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            securityContext:
              # Must start as root so the entrypoint can chown the volumes and
              # gosu-drop to BIRDNET_UID/GID — do not force non-root here.
              allowPrivilegeEscalation: true
              readOnlyRootFilesystem: false
            resources:
              requests:
                cpu: 500m # continuous inference; Perch is heavier than v2.4
                memory: 1Gi
              limits:
                memory: 3Gi
    defaultPodOptions:
      securityContext:
        # Entrypoint starts as root then drops to 1000; keep fsGroup so the
        # dropped user can read/write the VolSync PVC.
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}
    service:
      app:
        controller: birdnet-go
        ports:
          http:
            port: 8080
    persistence:
      data:
        existingClaim: birdnet-go
        globalMounts:
          - path: /config # config.yaml (entrypoint symlinks ~/.config/birdnet-go here)
            subPath: config
          - path: /data # WORKDIR: clips + downloaded models (Perch)
            subPath: data
      seed:
        # Rendered config.yaml lives in the ExternalSecret; init-config copies it
        # to the writable PVC once so the model gallery (Perch) + UI edits persist.
        type: secret
        name: birdnet-go-secret
        globalMounts:
          - path: /seed
            readOnly: true
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
