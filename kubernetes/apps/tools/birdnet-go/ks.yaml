---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: birdnet-go
  namespace: flux-system
spec:
  decryption:
    provider: sops
  targetNamespace: tools
  commonMetadata:
    labels:
      app.kubernetes.io/name: birdnet-go
  path: "./kubernetes/apps/tools/birdnet-go/app"
  prune: true
  dependsOn:
    - name: volsync
      namespace: storage
    - name: mariadb-cluster
      namespace: database
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false # Default false for speed, enable for critical
  components:
    - ../../../../components/volsync-kopia
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  postBuild:
    substitute:
      APP: birdnet-go
      VOLSYNC_COPYMETHOD: Direct
      VOLSYNC_CAPACITY: 30Gi # holds config + downloaded Perch model + saved clips
      VOLSYNC_STORAGECLASS: local-path
      VOLSYNC_PUID: "1000"
      VOLSYNC_PGID: "1000"
