---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/grafana.integreatly.org/grafanadashboard_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: parsedmarc-dmarc
spec:
  allowCrossNamespaceImport: true
  folder: Security
  instanceSelector:
    matchLabels:
      grafana.internal/instance: grafana
  datasources:
    - datasourceName: loki
      inputName: DS_LOKI
  json: |
    {
      "__inputs": [
        {
          "name": "DS_LOKI",
          "label": "Loki",
          "type": "datasource",
          "pluginId": "loki",
          "pluginName": "Loki"
        }
      ],
      "__requires": [
        {
          "type": "datasource",
          "id": "loki",
          "name": "Loki",
          "version": "1.0.0"
        }
      ],
      "description": "DMARC aggregate report analysis from ParseDMARC",
      "editable": true,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": {"type": "loki", "uid": "${DS_LOKI}"},
          "fieldConfig": {
            "defaults": {
              "color": {"fixedColor": "blue", "mode": "fixed"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]}
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["sum"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "title": "Total Messages",
          "type": "stat",
          "targets": [
            {
              "datasource": {"type": "loki", "uid": "${DS_LOKI}"},
              "expr": "sum(sum_over_time({namespace=\"tools\", container=\"parsedmarc\"} | json | type=`dmarc_aggregate` | report_end >= ${__from:date:seconds} | report_end <= ${__to:date:seconds} | unwrap count [$__range]))",
              "instant": true,
              "refId": "A"
            }
          ]
        },
        {
          "datasource": {"type": "loki", "uid": "${DS_LOKI}"},
          "fieldConfig": {
            "defaults": {
              "color": {"fixedColor": "green", "mode": "fixed"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["sum"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "title": "DKIM Pass",
          "type": "stat",
          "targets": [
            {
              "datasource": {"type": "loki", "uid": "${DS_LOKI}"},
              "expr": "sum(sum_over_time({namespace=\"tools\", container=\"parsedmarc\"} | json | type=`dmarc_aggregate` | dkim=`pass` | report_end >= ${__from:date:seconds} | report_end <= ${__to:date:seconds} | unwrap count [$__range]))",
              "instant": true,
              "refId": "A"
            }
          ]
        },
        {
          "datasource": {"type": "loki", "uid": "${DS_LOKI}"},
          "fieldConfig": {
            "defaults": {
              "color": {"fixedColor": "green", "mode": "fixed"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 0},
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["sum"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "title": "SPF Pass",
          "type": "stat",
          "targets": [
            {
              "datasource": {"type": "loki", "uid": "${DS_LOKI}"},
              "expr": "sum(sum_over_time({namespace=\"tools\", container=\"parsedmarc\"} | json | type=`dmarc_aggregate` | spf=`pass` | report_end >= ${__from:date:seconds} | report_end <= ${__to:date:seconds} | unwrap count [$__range]))",
              "instant": true,
              "refId": "A"
            }
          ]
        },
        {
          "datasource": {"type": "loki", "uid": "${DS_LOKI}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]
              }
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 0},
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {"calcs": ["sum"], "fields": "", "values": false},
            "textMode": "auto"
          },
          "title": "Quarantine / Reject",
          "type": "stat",
          "targets": [
            {
              "datasource": {"type": "loki", "uid": "${DS_LOKI}"},
              "expr": "sum(sum_over_time({namespace=\"tools\", container=\"parsedmarc\"} | json | type=`dmarc_aggregate` | disposition=~`quarantine|reject` | report_end >= ${__from:date:seconds} | report_end <= ${__to:date:seconds} | unwrap count [$__range]))",
              "instant": true,
              "refId": "A"
            }
          ]
        },
        {
          "datasource": {"type": "loki", "uid": "${DS_LOKI}"},
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "bars",
                "fillOpacity": 80,
                "lineWidth": 1,
                "spanNulls": false,
                "stacking": {"group": "A", "mode": "normal"}
              }
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "none"},
                "properties": [{"id": "color", "value": {"fixedColor": "green", "mode": "fixed"}}]
              },
              {
                "matcher": {"id": "byName", "options": "quarantine"},
                "properties": [{"id": "color", "value": {"fixedColor": "orange", "mode": "fixed"}}]
              },
              {
                "matcher": {"id": "byName", "options": "reject"},
                "properties": [{"id": "color", "value": {"fixedColor": "red", "mode": "fixed"}}]
              }
            ]
          },
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 4},
          "id": 5,
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom", "showLegend": true},
            "tooltip": {"mode": "multi", "sort": "none"}
          },
          "title": "Messages by Disposition",
          "type": "timeseries",
          "targets": [
            {
              "datasource": {"type": "loki", "uid": "${DS_LOKI}"},
              "expr": "sum by (disposition) (sum_over_time({namespace=\"tools\", container=\"parsedmarc\"} | json | type=`dmarc_aggregate` | report_end >= ${__from:date:seconds} | report_end <= ${__to:date:seconds} | unwrap count [$__interval]))",
              "legendFormat": "{{disposition}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": {"type": "loki", "uid": "${DS_LOKI}"},
          "fieldConfig": {"defaults": {}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "id": 6,
          "options": {
            "footer": {"show": false},
            "showHeader": true,
            "sortBy": [{"displayName": "Value", "desc": true}]
          },
          "title": "Failed Sources (DKIM + SPF fail)",
          "type": "table",
          "targets": [
            {
              "datasource": {"type": "loki", "uid": "${DS_LOKI}"},
              "expr": "sum by (source_ip, domain, reporter) (sum_over_time({namespace=\"tools\", container=\"parsedmarc\"} | json | type=`dmarc_aggregate` | dkim=`fail` | spf=`fail` | report_end >= ${__from:date:seconds} | report_end <= ${__to:date:seconds} | unwrap count [$__range]))",
              "instant": true,
              "legendFormat": "{{source_ip}} / {{domain}}",
              "refId": "A"
            }
          ]
        },
        {
          "datasource": {"type": "loki", "uid": "${DS_LOKI}"},
          "fieldConfig": {"defaults": {}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "id": 7,
          "options": {
            "footer": {"show": false},
            "showHeader": true
          },
          "title": "Results by Domain",
          "type": "table",
          "targets": [
            {
              "datasource": {"type": "loki", "uid": "${DS_LOKI}"},
              "expr": "sum by (domain, disposition) (sum_over_time({namespace=\"tools\", container=\"parsedmarc\"} | json | type=`dmarc_aggregate` | report_end >= ${__from:date:seconds} | report_end <= ${__to:date:seconds} | unwrap count [$__range]))",
              "instant": true,
              "refId": "A"
            }
          ]
        }
      ],
      "refresh": "1h",
      "schemaVersion": 38,
      "tags": ["dmarc", "mail", "security"],
      "time": {"from": "now-30d", "to": "now"},
      "timezone": "browser",
      "title": "DMARC Reports",
      "uid": "parsedmarc-dmarc",
      "version": 1
    }
