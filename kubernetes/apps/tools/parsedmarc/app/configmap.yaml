---
apiVersion: v1
kind: ConfigMap
metadata:
  name: parsedmarc-config
data:
  run.py: |
    #!/usr/bin/env python3
    import json, os, sys
    from datetime import datetime, timezone

    import parsedmarc
    import boto3

    imap_password     = os.environ['IMAP_PASSWORD']
    s3_key_id         = os.environ['S3_ACCESS_KEY_ID']
    s3_secret         = os.environ['S3_SECRET_ACCESS_KEY']
    s3_region         = os.environ['S3_REGION']
    s3_endpoint       = os.environ['S3_ENDPOINT']

    conn = parsedmarc.IMAPConnection(
        host='stalwart-mail.mail.svc.cluster.local',
        user='postmaster@erinko.fi',
        password=imap_password,
        port=993,
        ssl=True,
        verify=False,
    )

    results = parsedmarc.get_dmarc_reports_from_mailbox(
        conn,
        reports_folder='INBOX',
        archive_folder='INBOX/DMARC-Processed',
        delete=False,
        batch_size=50,
        create_folders=True,
    )

    aggregate_reports = results.get('aggregate_reports', [])
    failure_reports   = results.get('failure_reports', [])

    for report in aggregate_reports:
        meta   = report.get('report_metadata', {})
        policy = report.get('policy_published', {})
        report_end = meta.get('date_range', {}).get('end')
        for record in report.get('records', []):
            source      = record.get('source', {})
            policy_eval = record.get('policy_evaluated', {})
            ids         = record.get('identifiers', {})
            print(json.dumps({
                'type':          'dmarc_aggregate',
                'report_end':    report_end,
                'reporter':      meta.get('org_name'),
                'domain':        policy.get('domain'),
                'source_ip':     source.get('ip_address'),
                'count':         record.get('count', 0),
                'disposition':   policy_eval.get('disposition'),
                'dkim':          policy_eval.get('dkim'),
                'spf':           policy_eval.get('spf'),
                'header_from':   ids.get('header_from'),
                'envelope_from': ids.get('envelope_from'),
            }), flush=True)

    for report in failure_reports:
        print(json.dumps({'type': 'dmarc_failure', **report}), flush=True)

    if not aggregate_reports and not failure_reports:
        print(json.dumps({'type': 'dmarc_run', 'processed': 0}), flush=True)
        sys.exit(0)

    s3 = boto3.client(
        's3',
        aws_access_key_id=s3_key_id,
        aws_secret_access_key=s3_secret,
        region_name=s3_region,
        endpoint_url=s3_endpoint,
    )
    ts  = datetime.now(tz=timezone.utc).strftime('%Y/%m/%d/%H%M%S')
    key = f'aggregate/{ts}.json'
    s3.put_object(
        Bucket='parsedmarc',
        Key=key,
        Body=json.dumps(aggregate_reports, default=str),
        ContentType='application/json',
    )
    print(json.dumps({'type': 'dmarc_run', 'processed': len(aggregate_reports), 's3_key': key}), flush=True)
