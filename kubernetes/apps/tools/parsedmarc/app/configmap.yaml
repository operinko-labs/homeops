---
apiVersion: v1
kind: ConfigMap
metadata:
  name: parsedmarc-config
data:
  parsedmarc.ini.tpl: |
    [general]
    save_aggregate = True
    save_forensic = True

    [imap]
    host = stalwart-mail.mail.svc.cluster.local
    port = 993
    ssl = True
    skip_certificate_verification = True
    user = postmaster@erinko.fi
    password = __IMAP_PASSWORD__

    [mailbox]
    reports_folder = INBOX
    archive_folder = INBOX/DMARC-Processed
    watch = False
    delete = False
    batch_size = 50

    [syslog]
    server = alloy-syslog.observability.svc.cluster.local
    port = 6514
    protocol = tcp

    [s3]
    bucket = parsedmarc
    path = /
    access_key_id = __S3_ACCESS_KEY_ID__
    secret_access_key = __S3_SECRET_ACCESS_KEY__
    region_name = __S3_REGION__
    endpoint_url = __S3_ENDPOINT__

  run.sh: |
    #!/bin/sh
    set -e
    python3 -c "
    import os
    tpl = open('/etc/parsedmarc/parsedmarc.ini.tpl').read()
    for key in ['IMAP_PASSWORD', 'S3_ACCESS_KEY_ID', 'S3_SECRET_ACCESS_KEY', 'S3_REGION', 'S3_ENDPOINT']:
        tpl = tpl.replace('__' + key + '__', os.environ[key])
    open('/tmp/parsedmarc.ini', 'w').write(tpl)
    "
    parsedmarc -c /tmp/parsedmarc.ini
