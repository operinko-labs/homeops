---
apiVersion: v1
kind: ConfigMap
metadata:
  name: parsedmarc-config
data:
  parsedmarc.ini.tpl: |
    [general]
    save_aggregate = True
    save_forensic = True

    [imap]
    host = stalwart-mail.mail.svc.cluster.local
    port = 993
    ssl = True
    skip_certificate_verification = True
    user = postmaster@erinko.fi
    password = __IMAP_PASSWORD__

    [mailbox]
    reports_folder = INBOX
    archive_folder = INBOX/DMARC-Processed
    watch = False
    delete = False
    batch_size = 50

    [syslog]
    host = alloy-syslog.observability.svc.cluster.local
    port = 6514
    protocol = tcp

  run.sh: |
    #!/bin/sh
    set -e
    python3 -c "
    import os
    tpl = open('/etc/parsedmarc/parsedmarc.ini.tpl').read()
    open('/tmp/parsedmarc.ini', 'w').write(tpl.replace('__IMAP_PASSWORD__', os.environ['IMAP_PASSWORD']))
    "
    parsedmarc -c /tmp/parsedmarc.ini
