---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: parsedmarc
spec:
  schedule: "0 6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: parsedmarc
              image: ghcr.io/domainaware/parsedmarc:latest
              command: ["python3", "/etc/parsedmarc/run.py"]
              env:
                - name: IMAP_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: parsedmarc-imap
                      key: IMAP_PASSWORD
                - name: S3_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: parsedmarc-imap
                      key: S3_ACCESS_KEY_ID
                - name: S3_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: parsedmarc-imap
                      key: S3_SECRET_ACCESS_KEY
                - name: S3_REGION
                  valueFrom:
                    secretKeyRef:
                      name: parsedmarc-imap
                      key: S3_REGION
                - name: S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: parsedmarc-imap
                      key: S3_ENDPOINT
              volumeMounts:
                - name: config
                  mountPath: /etc/parsedmarc
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  memory: 256Mi
          volumes:
            - name: config
              configMap:
                name: parsedmarc-config
