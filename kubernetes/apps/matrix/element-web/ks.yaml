---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: element-web
  namespace: flux-system
spec:
  decryption:
    provider: sops
  targetNamespace: matrix
  commonMetadata:
    labels:
      app.kubernetes.io/name: element-web
  path: ./kubernetes/apps/matrix/element-web/app
  prune: true
  dependsOn:
    - name: synapse
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  interval: 30m
  retryInterval: 1m
  timeout: 5m
