---
apiVersion: v1
kind: ConfigMap
metadata:
  name: element-web-config
  namespace: matrix
data:
  config.json: |
    {
      "default_server_config": {
        "m.homeserver": {
          "base_url": "https://matrix.erinko.fi",
          "server_name": "erinko.fi"
        }
      },
      "brand": "Element",
      "disable_guests": true,
      "default_theme": "dark",
      "room_directory": {
        "servers": ["matrix.erinko.fi"]
      }
    }
