---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: synapse
  namespace: matrix
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: synapse
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      synapse:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/cloudnative-pg/postgresql
              tag: "18"
            command:
              - /bin/bash
              - -c
              - |
                set -eu
                export PGPASSWORD="${INIT_POSTGRES_SUPER_PASS}"
                psql "host=postgres18-rw.database.svc.cluster.local user=${INIT_POSTGRES_SUPER_USER} dbname=postgres" \
                  -f /init/init.sql
            envFrom:
              - secretRef:
                  name: synapse-secret
            securityContext:
              runAsUser: 65534
              runAsGroup: 65534
              runAsNonRoot: true
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
        containers:
          app:
            image:
              repository: harbor.vaderrp.com/operinko-labs/synapse
              tag: v1.131.0
            env:
              SYNAPSE_CONFIG_PATH: /config/homeserver.yaml
              TZ: Europe/Helsinki
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8008
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  failureThreshold: 60
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                memory: 2Gi

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 991
        runAsGroup: 991
        fsGroup: 991
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}
      dnsConfig:
        options:
          - name: ndots
            value: "1"
          - name: use-vc
          - name: single-request-reopen

    service:
      app:
        controller: synapse
        ports:
          http:
            port: *port

    persistence:
      config:
        type: secret
        name: synapse-secret
        advancedMounts:
          synapse:
            app:
              - path: /config/homeserver.yaml
                subPath: homeserver.yaml
                readOnly: true
      init-sql:
        type: secret
        name: synapse-secret
        advancedMounts:
          synapse:
            init-db:
              - path: /init/init.sql
                subPath: init.sql
                readOnly: true
      data:
        existingClaim: synapse
        advancedMounts:
          synapse:
            app:
              - path: /data
