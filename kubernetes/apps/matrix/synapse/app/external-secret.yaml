---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: synapse-secret
  namespace: matrix
spec:
  refreshInterval: 1h
  target:
    name: synapse-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        # Plain env vars for the init container
        INIT_POSTGRES_SUPER_USER: "{{ .postgres_super_user }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .postgres_super_pass }}"

        # Generated homeserver.yaml with secrets embedded
        homeserver.yaml: |
          server_name: "erinko.fi"
          public_baseurl: "https://matrix.erinko.fi/"
          pid_file: /data/homeserver.pid

          listeners:
            - port: 8008
              tls: false
              type: http
              x_forwarded: true
              resources:
                - names: [client, federation]

          serve_server_wellknown: true

          database:
            name: psycopg2
            txn_limit: 10000
            args:
              user: synapse
              password: "{{ .synapse_db_pass }}"
              database: synapse
              host: postgres18-rw.database.svc.cluster.local
              port: 5432
              cp_min: 5
              cp_max: 10

          media_store_path: /data/media_store

          media_storage_providers:
            - module: s3_storage_provider.S3StorageProviderBackend
              store_local: true
              store_remote: true
              config:
                endpoint_url: https://minio.vaderrp.com:9000
                access_key_id: "{{ .minio_access_key }}"
                secret_access_key: "{{ .minio_secret_key }}"
                bucket: synapse-media
                region_name: us-east-1

          signing_key_path: /data/erinko.fi.signing.key

          registration_shared_secret: "{{ .registration_shared_secret }}"
          macaroon_secret_key: "{{ .macaroon_secret_key }}"
          form_secret: "{{ .form_secret }}"

          enable_registration: false
          allow_guest_access: false
          federation_domain_whitelist: []

          report_stats: false
          suppress_key_server_warning: true

          trusted_key_servers:
            - server_name: "matrix.org"

        # Generated init SQL for PostgreSQL with required locale settings
        init.sql: |
          DO $$ BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'synapse') THEN
              CREATE ROLE synapse LOGIN PASSWORD '{{ .synapse_db_pass }}';
            END IF;
          END $$;
          ALTER ROLE synapse LOGIN PASSWORD '{{ .synapse_db_pass }}';
          SELECT 'CREATE DATABASE synapse
            ENCODING ''UTF8''
            LC_COLLATE = ''C''
            LC_CTYPE = ''C''
            TEMPLATE template0
            OWNER synapse'
          WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'synapse')\gexec

  data:
    # postgres18 cluster superuser — used by init container
    # TODO: Replace <POSTGRES18_BITWARDEN_UUID> with the Bitwarden item UUID for the postgres18 cluster credentials
    - secretKey: postgres_super_user
      sourceRef:
        storeRef:
          name: bitwarden-login
          kind: ClusterSecretStore
      remoteRef:
        key: <POSTGRES18_BITWARDEN_UUID>
        property: username
    - secretKey: postgres_super_pass
      sourceRef:
        storeRef:
          name: bitwarden-login
          kind: ClusterSecretStore
      remoteRef:
        key: <POSTGRES18_BITWARDEN_UUID>
        property: password

    # Synapse application secrets
    # TODO: Replace <SYNAPSE_BITWARDEN_UUID> with the Bitwarden item UUID for the "matrix-synapse" item
    - secretKey: synapse_db_pass
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: <SYNAPSE_BITWARDEN_UUID>
        property: postgres_password
    - secretKey: macaroon_secret_key
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: <SYNAPSE_BITWARDEN_UUID>
        property: macaroon_secret_key
    - secretKey: registration_shared_secret
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: <SYNAPSE_BITWARDEN_UUID>
        property: registration_shared_secret
    - secretKey: form_secret
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: <SYNAPSE_BITWARDEN_UUID>
        property: form_secret
    - secretKey: minio_access_key
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: <SYNAPSE_BITWARDEN_UUID>
        property: minio_access_key
    - secretKey: minio_secret_key
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: <SYNAPSE_BITWARDEN_UUID>
        property: minio_secret_key
