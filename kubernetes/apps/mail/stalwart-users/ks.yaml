---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: stalwart-users
  namespace: flux-system
spec:
  decryption:
    provider: sops
  targetNamespace: mail
  commonMetadata:
    labels:
      app.kubernetes.io/name: stalwart-users
  path: "./kubernetes/apps/mail/stalwart-users/app"
  prune: true
  dependsOn:
    - name: stalwart
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  interval: 30m
  retryInterval: 1m
  timeout: 5m
