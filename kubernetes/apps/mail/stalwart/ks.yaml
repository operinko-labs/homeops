---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: stalwart
  namespace: flux-system
spec:
  decryption:
    provider: sops
  targetNamespace: mail
  commonMetadata:
    labels:
      app.kubernetes.io/name: stalwart
  path: "./kubernetes/apps/mail/stalwart/app"
  prune: true
  dependsOn:
    - name: volsync
      namespace: storage
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  components:
    - ../../../../components/volsync-kopia
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  postBuild:
    substitute:
      APP: stalwart
      VOLSYNC_COPYMETHOD: Direct
      VOLSYNC_CAPACITY: 10Gi
      VOLSYNC_STORAGECLASS: local-path
