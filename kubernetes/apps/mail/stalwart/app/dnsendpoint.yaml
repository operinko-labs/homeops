---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/externaldns.k8s.io/dnsendpoint_v1alpha1.json
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: stalwart-mail
  labels:
    route.scope: external
spec:
  endpoints:
    # Mail server A record — must NOT be a CNAME (MX target)
    - dnsName: "mail.vaderrp.com"
      recordType: A
      targets: ["212.147.241.182"]
