---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/externaldns.k8s.io/dnsendpoint_v1alpha1.json
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: stalwart-mail
  labels:
    route.scope: external
spec:
  endpoints:
    # Mail server A record — must NOT be a CNAME (MX target)
    - dnsName: "mail.vaderrp.com"
      recordType: A
      targets: ["212.147.241.182"]
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "mail.vaderrp.com"
      recordType: AAAA
      targets: ["2a04:3545:1000:720:a4a6:11ff:fec5:5454"]
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    # SPF
    - dnsName: "mail.vaderrp.com"
      recordType: TXT
      targets: ["v=spf1 ip4:212.147.241.182 ip6:2a04:3545:1000:720:a4a6:11ff:fec5:5454 -all"]
