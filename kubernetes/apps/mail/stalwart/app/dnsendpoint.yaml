---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/externaldns.k8s.io/dnsendpoint_v1alpha1.json
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: stalwart-mail
  labels:
    route.scope: external
spec:
  endpoints:
    # Mail server CNAMEs — canonical hostname is mail.erinko.fi (managed manually)
    - dnsName: "mail.vaderrp.com"
      recordType: CNAME
      targets: ["mail.erinko.fi"]
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
    - dnsName: "mail.shadowmorph.info"
      recordType: CNAME
      targets: ["mail.erinko.fi"]
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "false"
