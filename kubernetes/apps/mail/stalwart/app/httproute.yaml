---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: stalwart-admin
  namespace: mail
  labels:
    route.scope: internal
  annotations:
    external-dns.alpha.kubernetes.io/public: "false"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Mail
    gethomepage.dev/name: Stalwart Admin
    gethomepage.dev/icon: stalwart-mail.png
    gethomepage.dev/href: https://stalwart-admin.vaderrp.com
    gethomepage.dev/pod-selector: app.kubernetes.io/name=stalwart
spec:
  parentRefs:
    - name: gateway-internal
      namespace: network
  hostnames:
    - stalwart-admin.vaderrp.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /manage/api
      backendRefs:
        - name: stalwart-api
          port: 3000
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: stalwart-app
          port: 8080
