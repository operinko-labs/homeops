---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: stalwart
  namespace: mail
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: stalwart
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      stalwart:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/cloudnative-pg/postgresql
              tag: "18"
            command: ["psql"]
            args:
              - "postgresql://$(STALWART_DB_USER):$(STALWART_DB_PASSWORD)@postgres18-rw.database.svc.cluster.local:5432/stalwart"
              - -f
              - /config/init-directory.sql
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
        containers:
          app:
            image:
              repository: ghcr.io/stalwartlabs/stalwart
              tag: v0.16.5@sha256:c5f18987702be8916f85bdf79141fbc1ae6ae97e804f6b8ec7b60eef9e3e59f8
            env:
              TZ: Europe/Helsinki
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz/live
                    port: &http-port 8080
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
                add: ["NET_BIND_SERVICE"]
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
          user-mgmt-api:
            image:
              repository: harbor.vaderrp.com/operinko-labs/stalwart-users
              tag: latest
            env:
              TZ: Europe/Helsinki
              PORT: "3000"
              STALWART_URL: "http://localhost:8080"
              ADMIN_USERS: "admin"
              PATH_PREFIX: "/manage/api"
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness: &api-probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: &api-port 3000
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *api-probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}
    service:
      app:
        controller: stalwart
        ports:
          http:
            port: *http-port
      api:
        controller: stalwart
        ports:
          http:
            port: *api-port
      mail:
        controller: stalwart
        type: ClusterIP
        externalIPs: ["172.16.8.10"]
        ports:
          smtp:
            port: 25
            protocol: TCP
          submission:
            port: 587
            protocol: TCP
          submissions:
            port: 465
            protocol: TCP
          imap:
            port: 143
            protocol: TCP
          imaps:
            port: 993
            protocol: TCP
          pop3s:
            port: 995
            protocol: TCP
          sieve:
            port: 4190
            protocol: TCP
          https:
            port: 443
            protocol: TCP
    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /var/lib/stalwart
      config:
        type: secret
        name: stalwart-secret
        globalMounts:
          - path: /etc/stalwart/config.json
            subPath: config.json
      init-sql:
        type: configMap
        name: stalwart-config
        globalMounts:
          - path: /config/init-directory.sql
            subPath: init-directory.sql
