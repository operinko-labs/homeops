---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bulwark
  namespace: mail
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: bulwark
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      bulwark:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/bulwarkmail/webmail
              tag: v1.7.1@sha256:7414b60aff72b013841eaba7c3de22c19b3e99d69e2776c10f56527d5bf4e0e8
            env:
              TZ: Europe/Helsinki
              JMAP_SERVER_URL: "https://mail.erinko.fi"
              APP_NAME: "Erinko Mail"
              APP_SHORT_NAME: "Mail"
              APP_DESCRIPTION: "Erinko Mail — webmail for erinko.fi, shadowmorph.info & vaderrp.com"
              LOG_FORMAT: json
              SETTINGS_SYNC_ENABLED: "true"
              TRUSTED_PROXY_DEPTH: "2"
              EXTENSION_DIRECTORY_URL: "https://extensions.bulwarkmail.org"
            envFrom:
              - secretRef:
                  name: bulwark-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 3000
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}
    persistence:
      data:
        existingClaim: bulwark
        globalMounts:
          - path: /app/data
    service:
      app:
        controller: bulwark
        ports:
          http:
            port: *port
