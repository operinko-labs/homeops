---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bulwark
  namespace: mail
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: bulwark
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      bulwark:
        containers:
          app:
            image:
              repository: ghcr.io/bulwarkmail/webmail
              tag: v1.6.3@sha256:6d5e84def6d7b1067497ee0df967442f6330268658bc91cf29f9e69bbb867a9c
            env:
              TZ: Europe/Helsinki
              JMAP_SERVER_URL: "https://mail.vaderrp.com"
              APP_NAME: "Vaderrp Mail"
              LOG_FORMAT: json
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 3000
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}
    service:
      app:
        controller: bulwark
        ports:
          http:
            port: *port
