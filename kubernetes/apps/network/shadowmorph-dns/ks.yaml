---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: shadowmorph-dns
  namespace: flux-system
spec:
  decryption:
    provider: sops
  targetNamespace: network
  commonMetadata:
    labels:
      app.kubernetes.io/name: shadowmorph-dns
  path: "./kubernetes/apps/network/shadowmorph-dns/app"
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  postBuild:
    substitute:
      APP: shadowmorph-dns
