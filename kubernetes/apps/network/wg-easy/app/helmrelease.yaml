---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: wg-easy
  namespace: network
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: wg-easy
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      wg-easy:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/wg-easy/wg-easy
              tag: "15.2.2"
            env:
              TZ: Europe/Helsinki
              # Public hostname/IP of the VPS that clients connect to
              WG_HOST: "${WG_EASY_HOST}"
              # WireGuard listen port (UDP)
              WG_PORT: "51820"
              # Subnet for WireGuard clients
              WG_DEFAULT_ADDRESS: "10.13.13.x"
              WG_DEFAULT_DNS: ""
              # Only allow traffic to Stalwart mail service (ClusterIP)
              # This restricts VPN clients to ONLY reach the mail server
              WG_ALLOWED_IPS: "10.13.13.0/24,${STALWART_CLUSTER_CIDR}"
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: &http-port 51821
                  periodSeconds: 10
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *http-port
                  periodSeconds: 10
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: *http-port
                  periodSeconds: 5
                  failureThreshold: 30
            securityContext:
              capabilities:
                add:
                  - NET_ADMIN
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        seccompProfile: {type: RuntimeDefault}
    service:
      app:
        controller: wg-easy
        ports:
          http:
            port: *http-port
      wireguard:
        controller: wg-easy
        type: NodePort
        ports:
          wireguard:
            port: 51820
            nodePort: 51820
            protocol: UDP
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /etc/wireguard
