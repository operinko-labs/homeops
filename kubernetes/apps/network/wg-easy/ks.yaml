---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: wg-easy
  namespace: flux-system
spec:
  decryption:
    provider: sops
  targetNamespace: network
  commonMetadata:
    labels:
      app.kubernetes.io/name: wg-easy
  path: "./kubernetes/apps/network/wg-easy/app"
  prune: true
  dependsOn:
    - name: volsync
      namespace: storage
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  components:
    - ../../../../components/volsync-kopia
  interval: 30m
  retryInterval: 1m
  timeout: 5m
  postBuild:
    substitute:
      APP: wg-easy
      WG_EASY_HOST: "212.147.241.182"
      STALWART_CLUSTER_CIDR: "10.96.0.0/16"
      VOLSYNC_COPYMETHOD: Direct
      VOLSYNC_CAPACITY: 256Mi
      VOLSYNC_STORAGECLASS: local-path
