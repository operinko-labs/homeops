---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: shadowmorph-info-production
  namespace: network
spec:
  secretName: shadowmorph-info-production-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: "shadowmorph.info"
  dnsNames:
    - "shadowmorph.info"
    - "*.shadowmorph.info"
