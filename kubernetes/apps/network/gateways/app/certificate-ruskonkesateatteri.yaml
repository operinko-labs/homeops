---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ruskonkesateatteri-fi-production
  namespace: network
spec:
  secretName: ruskonkesateatteri-fi-production-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: "ruskonkesateatteri.fi"
  dnsNames:
    - "ruskonkesateatteri.fi"
    - "*.ruskonkesateatteri.fi"
