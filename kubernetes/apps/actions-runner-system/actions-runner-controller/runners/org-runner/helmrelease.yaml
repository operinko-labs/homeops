---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &name org-runner
spec:
  chartRef:
    kind: OCIRepository
    name: gha-runner-scale-set
  interval: 1h
  values:
    githubConfigUrl: https://github.com/operinko-labs
    githubConfigSecret: org-runner-secret
    minRunners: 2
    maxRunners: 15
    containerMode:
      type: kubernetes
    controllerServiceAccount:
      name: actions-runner-controller
      namespace: actions-runner-system
    metrics:
      controllerManagerAddr: ":8080"
      listenerAddr: ":8080"
      listenerEndpoint: "/metrics"
    template:
      spec:
        securityContext:
          fsGroup: 1001
          fsGroupChangePolicy: OnRootMismatch
        containers:
          - name: runner
            image: ghcr.io/home-operations/actions-runner:2.335.1@sha256:3d544e5eed58722c0b6a97212a31eada0f9f2e99f189c41911a5573a23d7386a
            command: ["/home/runner/run.sh"]
            volumeMounts:
              - name: work
                mountPath: /home/runner/_work
            env:
              - name: ACTIONS_RUNNER_REQUIRE_JOB_CONTAINER
                value: "false"
              - name: NODE
                valueFrom:
                  fieldRef:
                    fieldPath: status.hostIP
            resources:
              requests:
                memory: 1Gi
                cpu: 1000m
              limits:
                memory: 4Gi
                cpu: 2000m
            securityContext:
              runAsUser: 1001
              runAsGroup: 1001
              allowPrivilegeEscalation: true
              readOnlyRootFilesystem: false
              capabilities:
                add:
                  - SYS_ADMIN
                  - SYS_RESOURCE
                  - SETUID
                  - SETGID
        serviceAccountName: *name
        volumes:
          - name: work
            emptyDir: {}
        nodeSelector:
          node-role.kubernetes.io/bulk-storage: "true"
