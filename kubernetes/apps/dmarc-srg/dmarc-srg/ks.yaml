---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dmarc-srg
  namespace: flux-system
spec:
  targetNamespace: dmarc-srg
  interval: 30m
  path: ./kubernetes/apps/dmarc-srg/dmarc-srg/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  timeout: 5m
  decryption:
    provider: sops
