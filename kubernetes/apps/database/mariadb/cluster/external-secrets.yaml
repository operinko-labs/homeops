---
# MariaDB root password.
# Create a Bitwarden item and replace the placeholder UUID.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mariadb-root
  namespace: database
spec:
  refreshInterval: 1h
  target:
    name: mariadb-root
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        password: "{{ .root_password }}"
  data:
    - secretKey: root_password
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: 128fb823-208c-43d1-afb9-ad49798b809a
        property: root_password
