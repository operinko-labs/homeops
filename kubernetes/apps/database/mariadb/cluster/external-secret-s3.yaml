---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mariadb-s3-secret
  namespace: database
spec:
  refreshInterval: 1h
  target:
    name: mariadb-s3-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        access-key-id: "{{ .access_key_id }}"
        secret-access-key: "{{ .secret_access_key }}"
        endpoint: "{{ .endpoint }}"
  data:
    - secretKey: access_key_id
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: 00000000-0000-0000-0000-000000000020  # TODO: replace with Bitwarden item UUID
        property: access-key-id
    - secretKey: secret_access_key
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: 00000000-0000-0000-0000-000000000020  # TODO: replace with Bitwarden item UUID
        property: secret-access-key
    - secretKey: endpoint
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: 00000000-0000-0000-0000-000000000020  # TODO: replace with Bitwarden item UUID
        property: endpoint
