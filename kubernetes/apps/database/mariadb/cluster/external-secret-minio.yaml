---
# MinIO credentials for MariaDB backups.
# Create a dedicated MinIO service account in the minio.vaderrp.com console
# with read/write access to the "mariadb" bucket, then store the key pair
# in a Bitwarden item and replace the placeholder UUID below.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mariadb-minio
  namespace: database
spec:
  refreshInterval: 1h
  target:
    name: mariadb-minio
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        access-key-id: "{{ .access_key_id }}"
        secret-access-key: "{{ .secret_access_key }}"
  data:
    - secretKey: access_key_id
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: 00000000-0000-0000-0000-000000000020  # TODO: replace with Bitwarden item UUID
        property: access_key_id
    - secretKey: secret_access_key
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: 00000000-0000-0000-0000-000000000020  # TODO: replace with Bitwarden item UUID
        property: secret_access_key
