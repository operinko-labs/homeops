---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres18-stalwart-user
  namespace: database
spec:
  refreshInterval: 1h
  target:
    name: postgres18-stalwart-user
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      type: kubernetes.io/basic-auth
      metadata:
        labels:
          cnpg.io/reload: "true"
      data:
        username: stalwart
        password: "{{ .db_password }}"
  data:
    - secretKey: db_password
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: afda7dff-e1ac-4c30-9ec9-1f81ad1e9971
        property: db_password
