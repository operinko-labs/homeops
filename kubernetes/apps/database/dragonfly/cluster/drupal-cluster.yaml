---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/dragonflydb.io/dragonfly_v1alpha1.json
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: dragonfly-drupal
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  image: ghcr.io/dragonflydb/dragonfly:v1.39.0
  replicas: 2
  env:
    - name: MAX_MEMORY
      valueFrom:
        resourceFieldRef:
          resource: limits.memory
          divisor: 1Mi
  args:
    - --maxmemory=$(MAX_MEMORY)Mi
    - --maxmemory_policy=volatile-lru
    - --proactor_threads=2
    - --cluster_mode=emulated
  authentication:
    passwordFromSecret:
      name: dragonfly-secret
      key: password
  nodeSelector:
    node-role.kubernetes.io/bulk-storage: "true"
  resources:
    requests:
      cpu: 100m
    limits:
      cpu: 500m
      memory: 512Mi
