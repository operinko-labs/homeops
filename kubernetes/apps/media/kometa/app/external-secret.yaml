---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: kometa-secret
  namespace: media
spec:
  refreshInterval: 1h
  target:
    name: kometa-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        # Kometa "Config Secrets": KOMETA_<NAME> env vars are substituted into
        # config.yml wherever <<name>> appears. Names must not contain underscores.
        # https://kometa.wiki/en/latest/kometa/environmental/
        KOMETA_PLEXTOKEN: "{{ .plextoken }}"
        KOMETA_TMDBAPIKEY: "{{ .tmdbapikey }}"
        KOMETA_RADARRAPIKEY: "{{ .radarrapikey }}"
        KOMETA_SONARRAPIKEY: "{{ .sonarrapikey }}"
  data:
    # Plex Token (same item used by maintainerr)
    - secretKey: plextoken
      sourceRef:
        storeRef:
          name: bitwarden-login
          kind: ClusterSecretStore
      remoteRef:
        key: baa08325-98f8-438b-bda9-4d08bb160983
        property: password

    # TMDb API Key — REQUIRED by Kometa.
    # TODO: Create a Bitwarden item with an "apikey" field containing your
    # TMDb API key (https://www.themoviedb.org/settings/api) and replace the
    # placeholder key below with its item ID.
    - secretKey: tmdbapikey
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: REPLACE-WITH-TMDB-BITWARDEN-ITEM-ID
        property: apikey

    # Radarr API Key (same item as radarr's own external-secret)
    - secretKey: radarrapikey
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: 94a56c69-171b-480c-8152-ec5fd0797a8a
        property: apikey

    # Sonarr API Key (same item as sonarr's own external-secret)
    - secretKey: sonarrapikey
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: 3877177e-270a-4def-901b-9d0c12b23248
        property: apikey
