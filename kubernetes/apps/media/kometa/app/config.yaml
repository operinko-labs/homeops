---
# Kometa configuration
# https://kometa.wiki/en/latest/config/overview/
#
# Secrets (<<name>>) are injected from KOMETA_<NAME> env vars provided by
# the kometa-secret ExternalSecret (Kometa "Config Secrets" feature).
#
# NOTE: Library names below must exactly match the library names in Plex.

libraries:
  Movies:
    remove_overlays: false
    collection_files:
      # Academy Awards (Oscars) collections
      - default: oscars
      # IMDb charts (Popular, Top 250, Lowest Rated)
      - default: imdb
      # Common Sense Media content-rating collections
      - default: content_rating_cs
    overlay_files:
      - default: resolution
      - default: audio_codec
      - default: ratings
        template_variables:
          # Fonts default to bundled fonts/Inter-Bold.ttf @ 63 (only the Inter
          # family ships with Kometa)
          rating1: critic                                        # matches mass_critic_rating_update: imdb
          rating1_image: imdb
          rating2: audience                                      # matches mass_audience_rating_update: tmdb
          rating2_image: tmdb
          horizontal_position: right
      - default: video_format
      - default: runtimes
      # Common Sense age rating badge
      - default: commonsense
      # Award/chart ribbons (Oscars, IMDb Top 250, ...)
      - default: ribbon
      # Languages spoken and subtitles with associated flags and two-digit lang codes
      - default: languages
      # Languages spoken and subtitles with associated flags and two-digit lang codes
      - default: languages
        template_variables:
          back_color: '#FFFFFF00'
          font_color: '#FFFFFF00'
    operations:
      # Fix/normalize metadata from TMDb
      mass_genre_update: tmdb
      mass_content_rating_update: tmdb
      mass_originally_available_update: tmdb
      mass_studio_update: tmdb
      # Ratings feeding the ratings overlay
      mass_critic_rating_update: imdb
      mass_audience_rating_update: tmdb
  TV Shows:
    remove_overlays: false
    collection_files:
      # IMDb charts (Popular, Top 250, Lowest Rated)
      - default: imdb
      # Common Sense Media content-rating collections
      - default: content_rating_cs
    overlay_files:
      # Common Sense age rating badge (show posters)
      - default: commonsense
      # Episode-level overlays
      - default: resolution
        template_variables:
          builder_level: episode
      - default: audio_codec
        template_variables:
          builder_level: episode
      - default: ratings
        template_variables:
          # Fonts default to bundled fonts/Inter-Bold.ttf @ 63 (only the Inter
          # family ships with Kometa)
          rating1: critic                                        # matches mass_episode_critic_rating_update: imdb
          rating1_image: imdb
          rating2: audience                                      # matches mass_episode_audience_rating_update: tmdb
          rating2_image: tmdb
          horizontal_position: right
          builder_level: episode
      - default: video_format
        template_variables:
          builder_level: episode
      - default: episode_info
        template_variables:
          builder_level: episode
      - default: runtimes
        template_variables:
          builder_level: episode
      # Languages spoken and subtitles with associated flags and two-digit lang codes
      - default: languages
      # Languages spoken and subtitles with associated flags and two-digit lang codes
      - default: languages
        template_variables:
          back_color: '#FFFFFF00'
          font_color: '#FFFFFF00'
    operations:
      mass_genre_update: tmdb
      mass_content_rating_update: tmdb
      mass_originally_available_update: tmdb
      mass_studio_update: tmdb
      # Episode ratings feeding the episode-level ratings overlay
      mass_episode_critic_rating_update: imdb
      mass_episode_audience_rating_update: tmdb

settings:
  cache: true
  cache_expiration: 60
  asset_directory: /config/assets
  asset_folders: true
  show_missing: false
  show_unmanaged: true
  show_unconfigured: true
  show_filtered: false
  show_options: false
  save_report: false
  minimum_items: 1
  delete_below_minimum: false
  run_again_delay: 2
  verify_ssl: true

plex:
  url: https://plex.vaderrp.com
  token: <<plextoken>>
  timeout: 60
  clean_bundles: false
  empty_trash: false
  optimize: false

tmdb:
  apikey: <<tmdbapikey>>
  language: en
  region: FI
  cache_expiration: 60

radarr:
  url: http://radarr.media.svc.cluster.local
  token: <<radarrapikey>>
  add_missing: false
  # Add Plex items that Radarr doesn't know about to Radarr (in place, no download)
  add_existing: true
  upgrade_existing: false
  # If Plex sees the media at a different path than Radarr's /mnt/media,
  # uncomment and adjust so add_existing registers paths Radarr can access:
  # radarr_path: /mnt/media
  # plex_path: /path/as/seen/by/plex
  monitor: true
  availability: announced
  # Only used when add_missing is enabled
  root_folder_path: /mnt/media/Movies
  quality_profile: HD Bluray + WEB

sonarr:
  url: http://sonarr.media.svc.cluster.local
  token: <<sonarrapikey>>
  add_missing: false
  # Add Plex items that Sonarr doesn't know about to Sonarr (in place, no download)
  add_existing: true
  upgrade_existing: false
  # If Plex sees the media at a different path than Sonarr's /mnt/media,
  # uncomment and adjust so add_existing registers paths Sonarr can access:
  # sonarr_path: /mnt/media
  # plex_path: /path/as/seen/by/plex
  monitor: all
  series_type: standard
  season_folder: true
  # Only used when add_missing is enabled
  root_folder_path: /mnt/media/TV
  quality_profile: WEB-1080p
