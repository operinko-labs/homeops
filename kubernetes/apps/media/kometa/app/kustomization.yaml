---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ocirepository.yaml
  - helmrelease.yaml
  - external-secret.yaml
  - vpa.yaml

configMapGenerator:
  - name: kometa-values
    files:
      - values.yaml
    options:
      disableNameSuffixHash: true # Optional, keeps name clean
  - name: kometa-config
    files:
      - config.yml
    options:
      disableNameSuffixHash: true
