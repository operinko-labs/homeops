---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ocirepository.yaml
  - helmrelease.yaml
  - external-secret.yaml
  - pvc.yaml
  - httproute.yaml
  - vpa.yaml
  # posterizarr-overlays ConfigMap (binaryData-embedded PNGs — Flux excludes
  # *.png from Git artifacts, so configMapGenerator file sources can't be used)
  - configmap.yaml

configMapGenerator:
  - name: posterizarr-values
    files:
      - values.yaml
    options:
      disableNameSuffixHash: true # Optional, keeps name clean
