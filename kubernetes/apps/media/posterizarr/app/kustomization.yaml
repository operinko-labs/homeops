---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ocirepository.yaml
  - helmrelease.yaml
  - external-secret.yaml
  - pvc.yaml
  - httproute.yaml
  - vpa.yaml

configMapGenerator:
  - name: posterizarr-values
    files:
      - values.yaml
    options:
      disableNameSuffixHash: true # Optional, keeps name clean
  # Custom overlay images (from bullmoose20's community config) — copied
  # into /config by the copy-config initContainer
  - name: posterizarr-overlays
    files:
      - overlays/bottom-up-fade.png
      - overlays/bottom-up-fade-background.png
    options:
      disableNameSuffixHash: true
