---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: posterizarr-secret
  namespace: media
spec:
  refreshInterval: 1h
  target:
    name: posterizarr-secret
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        # Full Posterizarr config - rendered here because it embeds API tokens.
        # An initContainer copies it onto the /config PVC at pod start, so git
        # stays the source of truth across restarts while the app can still
        # write to the file at runtime.
        # Inspired by bullmoose20's community config:
        # https://github.com/Kometa-Team/Community-Configs/blob/master/bullmoose20/posterizarr/bullmoose20config.json
        config.json: |
          {
            "ApiPart": {
              "tvdbapi": "{{ .tvdbapi }}",
              "tmdbtoken": "{{ .tmdbtoken }}",
              "FanartTvAPIKey": "{{ .fanarttvapikey }}",
              "PlexToken": "{{ .plextoken }}",
              "JellyfinAPIKey": "unused",
              "EmbyAPIKey": "unused",
              "FavProvider": "tmdb",
              "PreferredLanguageOrder": ["xx"],
              "PreferredSeasonLanguageOrder": ["xx"],
              "PreferredBackgroundLanguageOrder": ["xx"],
              "PreferredTCLanguageOrder": ["xx"],
              "LogoLanguageOrder": ["en"],
              "tmdb_vote_sorting": "vote_average",
              "WidthHeightFilter": "false",
              "PosterMinWidth": "2000",
              "PosterMinHeight": "3000",
              "BgTcMinWidth": "3840",
              "BgTcMinHeight": "2160"
            },
            "PlexPart": {
              "LibstoExclude": [],
              "PlexUrl": "https://plex.vaderrp.com",
              "UsePlex": "true",
              "UploadExistingAssets": "false"
            },
            "JellyfinPart": {
              "LibstoExclude": [],
              "JellyfinUrl": "http://localhost:8096",
              "UseJellyfin": "false",
              "UploadExistingAssets": "false",
              "ReplaceThumbwithBackdrop": "false"
            },
            "EmbyPart": {
              "LibstoExclude": [],
              "EmbyUrl": "http://localhost:8096",
              "UseEmby": "false",
              "UploadExistingAssets": "false",
              "ReplaceThumbwithBackdrop": "false"
            },
            "Notification": {
              "SendNotification": "false",
              "AppriseUrl": "",
              "Discord": "",
              "UseUptimeKuma": "false",
              "UptimeKumaUrl": "",
              "DiscordUserName": "Posterizarr"
            },
            "PrerequisitePart": {
              "AssetPath": "/assets",
              "BackupPath": "/assetsbackup",
              "ManualAssetPath": "/manualassets",
              "magickinstalllocation": "./magick",
              "maxLogs": "10",
              "logLevel": "2",
              "font": "Comfortaa-Medium.ttf",
              "backgroundfont": "Comfortaa-Medium.ttf",
              "titlecardfont": "Comfortaa-Medium.ttf",
              "collectionfont": "Colus-Regular.ttf",
              "RTLFont": "Colus-Regular.ttf",
              "overlayfile": "overlay.png",
              "backgroundoverlayfile": "bottom-up-fade-background.png",
              "titlecardoverlayfile": "bottom-up-fade-background.png",
              "seasonoverlayfile": "bottom-up-fade.png",
              "collectionoverlayfile": "overlay.png",
              "showoverlayfile": "",
              "showbackgroundoverlayfile": "",
              "LibraryFolders": "true",
              "Posters": "true",
              "SeasonPosters": "true",
              "BackgroundPosters": "true",
              "TitleCards": "true",
              "show_skipped": "false",
              "SkipTBA": "true",
              "SkipJapTitle": "false",
              "AssetCleanup": "true",
              "AutoUpdateIM": "false",
              "AutoUpdatePosterizarr": "false",
              "NewLineOnSpecificSymbols": "false",
              "NewLineSymbols": [" - "],
              "NewLineOnSpecificWords": "false",
              "NewLineWords": {},
              "SymbolsToKeepOnNewLine": [],
              "PlexUpload": "true",
              "ForceRunningDeletion": "false",
              "SkipAddText": "false",
              "SkipAddTextAndBorder": "false",
              "SkipAddTextAndOverlay": "false",
              "SkipLocalPosterTextAdd": "false",
              "SkipLocalBackgroundTextAdd": "false",
              "SkipLocalSeasonTextAdd": "false",
              "SkipLocalTCTextAdd": "false",
              "FollowSymlink": "false",
              "FileTestOnTrigger": "true",
              "DisableHashValidation": "false",
              "DisableOnlineAssetFetch": "false",
              "UsePosterResolutionOverlays": "false",
              "UseBackgroundResolutionOverlays": "false",
              "UseTCResolutionOverlays": "false",
              "poster4k": "overlay.png",
              "Poster1080p": "overlay.png",
              "Background4k": "bottom-up-fade-background.png",
              "Background1080p": "bottom-up-fade-background.png",
              "TC4k": "bottom-up-fade-background.png",
              "TC1080p": "bottom-up-fade-background.png",
              "4KDoVi": "overlay.png",
              "4KHDR10": "overlay.png",
              "4KDoViHDR10": "overlay.png",
              "4KDoViBackground": "bottom-up-fade-background.png",
              "4KHDR10Background": "bottom-up-fade-background.png",
              "4KDoViHDR10Background": "bottom-up-fade-background.png",
              "4KDoViTC": "bottom-up-fade-background.png",
              "4KHDR10TC": "bottom-up-fade-background.png",
              "4KDoViHDR10TC": "bottom-up-fade-background.png",
              "UseLogo": "true",
              "UseClearlogo": "true",
              "UseClearart": "false",
              "LogoTextFallback": "true",
              "UseBGLogo": "false",
              "ConvertLogoColor": "false",
              "LogoFlatColor": "white",
              "UseOriginalTitle": "false"
            },
            "OverlayPart": {
              "ImageProcessing": "true",
              "outputQuality": "92%"
            },
            "PosterOverlayPart": {
              "fontAllCaps": "true",
              "fontcolor": "white",
              "bordercolor": "white",
              "minPointSize": "83",
              "maxPointSize": "250",
              "borderwidth": "30",
              "strokecolor": "black",
              "strokewidth": "6",
              "lineSpacing": "0",
              "AddBorder": "false",
              "AddText": "true",
              "AddTextStroke": "false",
              "AddOverlay": "true",
              "MaxWidth": "1200",
              "MaxHeight": "485",
              "text_offset": "+300",
              "TextGravity": "south"
            },
            "SeasonPosterOverlayPart": {
              "fontAllCaps": "true",
              "fontcolor": "white",
              "bordercolor": "white",
              "minPointSize": "100",
              "maxPointSize": "250",
              "borderwidth": "30",
              "strokecolor": "black",
              "strokewidth": "6",
              "lineSpacing": "0",
              "AddBorder": "false",
              "AddText": "true",
              "AddTextStroke": "false",
              "AddOverlay": "true",
              "MaxWidth": "1200",
              "MaxHeight": "485",
              "text_offset": "+300",
              "TextGravity": "south",
              "ShowFallback": "false"
            },
            "BackgroundOverlayPart": {
              "fontAllCaps": "true",
              "fontcolor": "white",
              "bordercolor": "white",
              "minPointSize": "95",
              "maxPointSize": "250",
              "borderwidth": "30",
              "strokecolor": "black",
              "strokewidth": "6",
              "lineSpacing": "0",
              "AddOverlay": "true",
              "AddBorder": "false",
              "AddText": "false",
              "AddTextStroke": "false",
              "MaxWidth": "3000",
              "MaxHeight": "500",
              "text_offset": "+200",
              "TextGravity": "south"
            },
            "TitleCardOverlayPart": {
              "bordercolor": "white",
              "borderwidth": "30",
              "UseBackgroundAsTitleCard": "false",
              "BackgroundFallback": "false",
              "AddOverlay": "true",
              "AddBorder": "false",
              "SkipWords": ["TBA"]
            },
            "TitleCardTitleTextPart": {
              "fontAllCaps": "true",
              "fontcolor": "white",
              "minPointSize": "48",
              "maxPointSize": "140",
              "strokecolor": "black",
              "strokewidth": "6",
              "lineSpacing": "0",
              "AddEPTitleText": "true",
              "AddTextStroke": "false",
              "MaxWidth": "2500",
              "MaxHeight": "300",
              "text_offset": "-150",
              "TextGravity": "south"
            },
            "TitleCardEPTextPart": {
              "fontAllCaps": "true",
              "fontcolor": "white",
              "minPointSize": "48",
              "maxPointSize": "80",
              "strokecolor": "black",
              "strokewidth": "6",
              "lineSpacing": "0",
              "SeasonTCText": "Season",
              "EpisodeTCText": "Episode",
              "AddEPText": "true",
              "AddTextStroke": "false",
              "MaxWidth": "2500",
              "MaxHeight": "150",
              "text_offset": "+100",
              "TextGravity": "south"
            },
            "CollectionTitlePosterPart": {
              "fontAllCaps": "true",
              "fontcolor": "white",
              "bordercolor": "white",
              "minPointSize": "83",
              "maxPointSize": "250",
              "borderwidth": "30",
              "strokecolor": "black",
              "strokewidth": "6",
              "lineSpacing": "0",
              "AddBorder": "false",
              "AddText": "true",
              "AddCollectionTitle": "true",
              "CollectionTitle": "COLLECTION",
              "AddTextStroke": "false",
              "AddOverlay": "true",
              "MaxWidth": "1200",
              "MaxHeight": "485",
              "text_offset": "+300",
              "TextGravity": "south"
            }
          }
  data:
    # Plex Token (shared kometa/posterizarr media item)
    - secretKey: plextoken
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: 82de75a5-08e1-4f8c-82a3-1b45d067e78e
        property: plextoken

    # TMDb API *Read Access Token* (the long v4 bearer token, NOT the v3
    # apikey kometa uses). TODO: add a "tmdbtoken" field to the item.
    - secretKey: tmdbtoken
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: 82de75a5-08e1-4f8c-82a3-1b45d067e78e
        property: tmdbtoken

    # TVDB API key (free at thetvdb.com/api-information).
    # TODO: add a "tvdbapi" field to the item.
    - secretKey: tvdbapi
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: 82de75a5-08e1-4f8c-82a3-1b45d067e78e
        property: tvdbapi

    # Fanart.tv personal API key (free at fanart.tv/get-an-api-key).
    # TODO: add a "fanarttvapikey" field to the item.
    - secretKey: fanarttvapikey
      sourceRef:
        storeRef:
          name: bitwarden-fields
          kind: ClusterSecretStore
      remoteRef:
        key: 82de75a5-08e1-4f8c-82a3-1b45d067e78e
        property: fanarttvapikey
