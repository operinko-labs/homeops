---
# Helm values for posterizarr app-template deployment
controllers:
  posterizarr:
    annotations:
      reloader.stakater.com/auto: "true"
    strategy: Recreate
    initContainers:
      copy-config:
        image:
          repository: docker.io/library/busybox
          tag: 1.37.0
        command:
          - sh
          - -c
          - cp /secret/config.json /config/config.json
    containers:
      app:
        image:
          repository: ghcr.io/fscorrupt/posterizarr
          tag: 3.1.3@sha256:7fb8d115226aedbee60e986c44e57d667f0c4bf93680038601c178d06c1967fb
        env:
          TZ: Europe/Helsinki
          TERM: xterm
          # Daily run at 05:00, an hour before kometa's overlay/operations run
          RUN_TIME: "05:00"
          APP_PORT: &port 8000
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: *port
              initialDelaySeconds: 30
              periodSeconds: 30
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: *port
              initialDelaySeconds: 10
              periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
        resources:
          requests:
            cpu: 25m
            memory: 512Mi
          limits:
            memory: 4Gi
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 568
    runAsGroup: 568
    fsGroup: 568
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile: {type: RuntimeDefault}
  dnsConfig:
    options:
      - name: ndots
        value: "1"
      - name: use-vc
      - name: single-request-reopen
service:
  app:
    controller: posterizarr
    ports:
      http:
        port: 8000
persistence:
  config:
    type: persistentVolumeClaim
    existingClaim: posterizarr
    globalMounts:
      - path: /config
  secret-config:
    type: secret
    name: posterizarr-secret
    advancedMounts:
      posterizarr:
        copy-config:
          - path: /secret
  assets:
    type: persistentVolumeClaim
    existingClaim: posterizarr-assets
    advancedMounts:
      posterizarr:
        app:
          - path: /assets
  assetsbackup:
    type: emptyDir
    advancedMounts:
      posterizarr:
        app:
          - path: /assetsbackup
  manualassets:
    type: emptyDir
    advancedMounts:
      posterizarr:
        app:
          - path: /manualassets
  tmp:
    type: emptyDir
    advancedMounts:
      posterizarr:
        app:
          - path: /tmp
