---
# Custom overlay images from bullmoose20's community config:
# https://github.com/Kometa-Team/Community-Configs/tree/master/bullmoose20/posterizarr
# Embedded as binaryData because Flux source-controller excludes *.png from
# Git artifacts by default. Values must be single-line: folded/literal YAML
# scalars introduce whitespace, which is illegal in base64 here.
# The copy-config initContainer places these into /config for Posterizarr.
apiVersion: v1
kind: ConfigMap
metadata:
  name: posterizarr-overlays
  namespace: media
binaryData:
  bottom-up-fade.png: 
  bottom-up-fade-background.png: 
