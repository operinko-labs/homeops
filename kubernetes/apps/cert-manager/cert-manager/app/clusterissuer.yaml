---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/cert-manager.io/clusterissuer_v1.json
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-production
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cert-manager-secret
              key: apitoken
        selector:
          dnsZones: ["vaderrp.com"]
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cert-manager-secret
              key: apitoken
        selector:
          dnsZones: ["shadowmorph.info"]
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cert-manager-secret
              key: apitoken
        selector:
          dnsZones: ["erinko.fi"]
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cert-manager-secret
              key: apitoken
        selector:
          dnsZones: ["hietamakidojo.fi"]
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cert-manager-secret
              key: apitoken
        selector:
          dnsZones: ["ruskonkesateatteri.fi"]
