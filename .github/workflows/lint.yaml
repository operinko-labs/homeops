---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Lint

on:
  push:
    branches: ["main"]
    paths:
      - "kubernetes/**"
      - "talos/**"
      - "scripts/**"
      - "bootstrap/**"
      - ".yamllint"
      - ".shellcheckrc"
      - ".github/workflows/lint.yaml"
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install yamllint
        run: pip install --quiet yamllint

      - name: Run yamllint
        run: yamllint .

  kubeconform:
    name: Kubeconform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Install kubeconform
        run: |
          # renovate: datasource=github-releases depName=yannh/kubeconform
          KUBECONFORM_VERSION=v0.6.7
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar xz -C /usr/local/bin

      - name: Run kubeconform
        run: |
          kubeconform \
            -strict \
            -ignore-missing-schemas \
            -ignore-filename-pattern '\.sops\.yaml$' \
            -ignore-filename-pattern 'config\.yaml$' \
            -ignore-filename-pattern 'values\.yaml$' \
            -ignore-filename-pattern 'lokirule\.yaml$' \
            -ignore-filename-pattern 'resources.(settings|kubernetes)\.yaml$' \
            -summary \
            kubernetes/

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Run ShellCheck
        run: |
          shopt -s globstar
          shellcheck scripts/**/*.sh
