---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build Synapse

on:
  push:
    branches:
      - main
    paths:
      - "apps/synapse/**"
      - ".github/workflows/build-synapse.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "apps/synapse/**"
  workflow_dispatch:
    inputs:
      force_push:
        description: "Force push image even on PR"
        required: false
        type: boolean
        default: false

env:
  REGISTRY: harbor.vaderrp.com
  IMAGE_NAME: operinko-labs/synapse

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Read version from VERSION file
        id: version
        run: |
          VERSION=$(cat apps/synapse/VERSION | tr -d '[:space:]')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to Harbor
        if: github.event_name != 'pull_request' || inputs.force_push
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: apps/synapse
          file: apps/synapse/Dockerfile
          push: ${{ github.event_name != 'pull_request' || inputs.force_push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            SYNAPSE_VERSION=${{ steps.version.outputs.version }}
