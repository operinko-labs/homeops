---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Build Log Aggregator

on:
  push:
    branches:
      - main
    paths:
      - "apps/log-aggregator/**"
      - ".github/workflows/build-log-aggregator.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "apps/log-aggregator/**"
  workflow_dispatch:
    inputs:
      force_push:
        description: "Force push image even on PR"
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      IMAGE_NAME: operinko-labs/log-aggregator

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Resolve Harbor registry host
        run: |
          echo "REGISTRY=$(echo "${{ secrets.HARBOR_URL }}" | sed -E 's#^[a-zA-Z]+://##; s#/+$##')" >> "$GITHUB_ENV"

      - name: Read version from VERSION file
        id: version
        run: |
          VERSION=$(cat apps/log-aggregator/VERSION | tr -d '[:space:]')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Log in to Harbor
        if: github.event_name != 'pull_request' || inputs.force_push
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Check if version already exists
        id: check
        run: |
          if docker manifest inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "::notice::Version ${{ steps.version.outputs.version }} already exists, skipping build"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Version ${{ steps.version.outputs.version }} does not exist, will build"
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists != 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Extract metadata
        if: steps.check.outputs.exists != 'true' || github.event_name == 'workflow_dispatch'
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        if: steps.check.outputs.exists != 'true' || github.event_name == 'workflow_dispatch'
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: apps/log-aggregator
          file: apps/log-aggregator/Dockerfile
          push: ${{ github.event_name != 'pull_request' || inputs.force_push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        if: (steps.check.outputs.exists != 'true' || github.event_name == 'workflow_dispatch') && github.event_name != 'pull_request' && steps.build.outputs.digest != ''
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
