# Managed by homeops vps/ module - do not edit on the host
# Postfix binds inet_interfaces = 172.16.8.2, so wg0 must be up first;
# without this it loses the boot race and fails fatally (no retry).
[Unit]
After=wg-quick@wg0.service
Wants=wg-quick@wg0.service

[Service]
Restart=on-failure
RestartSec=5s
